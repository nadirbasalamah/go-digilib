all: false
dir: "{{.InterfaceDir}}/mocks"
filename: mocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: "{{.Mock}}{{.InterfaceName}}"
pkgname: "{{.SrcPackageName}}"
recursive: false
require-template-schema-exists: true
template: testify
template-schema: "{{.Template}}.schema.json"
packages:
  go-digilib/books:
    interfaces:
      Repository:
      Service:

  go-digilib/categories:
    interfaces:
      Repository:
      Service:

  go-digilib/users:
    interfaces:
      Repository:
      Service:

  go-digilib/rents:
    interfaces:
      Repository:
      Service:

  go-digilib/carts:
    interfaces:
      Repository:
      Service:

  go-digilib/settings:
    interfaces:
      Repository:
      Service:

  go-digilib/auth:
    interfaces:
      Repository:
      Service:
